<html>
<head>
    <title>Clothe-Me</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Link para que funcione el componente del Daisy UI-->
     <script>
        tailwind.config = {
        plugins: [daisyui],
        }
    </script>
    <!-- daisyUI CDN -->
    <script src="https://cdn.jsdelivr.net/npm/daisyui@latest"></script>

    <style> 
    html {
        height:100%;
    }
    body {
        margin:0;
    }
    .bg {
        animation:slide 3s ease-in-out infinite alternate;
       background-image: linear-gradient(-60deg, rgb(103, 201, 126) 50%, rgb(134, 209, 212) 50%);
        bottom:0;
        left:-50%;
        opacity:.5;
        position:fixed;
        right:-50%;
        top:0;
        z-index:-1;
    }
    .bg2 {
        animation-direction:alternate-reverse;
        animation-duration:4s;
    }
    .bg3 {
        animation-duration:5s;
    }
    .content {
        background-color:rgba(255,255,255,.8);
        border-radius:.25em;
        box-shadow:0 0 .25em rgba(0,0,0,.25);
        box-sizing:border-box;
        left:50%;
        padding:10vmin;
        position:fixed;
        text-align:center;
        top:50%;
        transform:translate(-50%, -50%);
    }
    h1 {
        font-family:monospace;
    }
    @keyframes slide {
        0% {
            transform:translateX(-25%);
        }
        100% {
            transform:translateX(25%);
        }
        }
    </style>
</head>
<body className="bg-gray-100 flex flex-col items-center justify-center lg:justify-center min-h-screen">
    <!-- divs para fondo animado -->
    <div className="bg"></div>
    <div className="bg bg2"></div>
    <div className="bg bg3"></div>
    
    <!-- bandeja del login -->
    <div className=" mx-24 px-16 p-8 flex flex-col sml-4/5 bg-[#fffBfA] rounded-3xl shadow-xl 
                lg:ml-auto lg:mr-8 lg:my-1 lg:w-2/5 lg:rounded-3xl lg:justify-center lg:shadow-2xl lg:py-6 lg:px-12">
        <!-- logo e imagenes-->
        <div>
            <div className="flex items-center justify-center mt-16 
                        lg:mt-0">
                <img src="dist/img/Logotipo.png" alt="Logo" width="300" height="300" 
                     className="bg-slate-300 rounded-3xl lg:w-48 lg:h-48">
            </div>
            <h1 className="mt-24 flex items-center justify-center text-8xl font-bold text-[#4B5563] my-auto 
                       lg:text-5xl lg:mt-6">
                Clothe-Me
            </h1>
            <div className="mt-8 flex items-center justify-center text-center text-3xl font-bold text-[#878d98] pb-8 
                        lg:text-xl lg:mt-4 lg:pb-2">
                una aplicación para intercambio de prendas entre miembros de la universidad
            </div>
        </div>
        <!-- boton de login -->
        <button className="py-2 mt-16 mb-10 border-2 border-darkgray shadow-xl rounded-xl flex items-center justify-center btn bg-FFFBFA text-4xl text-black border-[#e5e5e5] 
                       lg:mt-6 lg:mb-0 lg:text-xl">
            <svg aria-label="Google logo" width="58" height="58" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <g>
                    <path d="m0 0H512V512H0" fill="#fff"></path>
                    <path fill="#34a853" d="M153 292c30 82 118 95 171 60h62v48A192 192 0 0190 341"></path>
                    <path fill="#4285f4" d="m386 400a140 175 0 0053-179H260v74h102q-7 37-38 57"></path>
                    <path fill="#fbbc02" d="m90 341a208 200 0 010-171l63 49q-12 37 0 73"></path>
                    <path fill="#ea4335" d="m153 219c22-69 116-109 179-50l55-54c-78-75-230-72-297 55"></path>
                </g>
            </svg>
            <p className="font-sans font-bold">Login with Google</p>
        </button>
    </div>   
</body>

</html>
