<html>
<head>
    <title>Clothe-Me</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Link para que funcione el componente del Daisy UI-->
     <script>
        tailwind.config = {
        plugins: [daisyui],
        }
    </script>
    <!-- daisyUI CDN -->
    <script src="https://cdn.jsdelivr.net/npm/daisyui@latest"></script>

<body class="bg-gray-100 flex flex-col items-center justify-center" id ="FondoLogin">
